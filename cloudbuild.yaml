steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - $_IMAGE
      - --build-arg
      - GEMINI_API_KEY=$$GEMINI_API_KEY
      - .
    secretEnv:
      - GEMINI_API_KEY

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_IMAGE

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image
      - $_IMAGE
      - --region
      - $_REGION
      - --platform
      - managed
      - --allow-unauthenticated

images:
  - $_IMAGE

substitutions:
  _REGION: us-west1
  _SERVICE: coastercount-pro
  _IMAGE: us-west1-docker.pkg.dev/gen-lang-client-0691213576/coastercount/coastercount-pro:latest


availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GEMINI_API_KEY/versions/latest
      env: GEMINI_API_KEY
options:
  logging: CLOUD_LOGGING_ONLY
